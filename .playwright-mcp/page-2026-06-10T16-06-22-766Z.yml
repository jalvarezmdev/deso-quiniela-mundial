                  - generic [ref=e626]:
                    - paragraph [ref=e627]: UEFA Champions League, also known as European Cup, is a professional football league for men.
                    - paragraph [ref=e628]: The current holder of the title is Paris Saint-Germain and the team that holds the most titles is Real Madrid.
                    - paragraph [ref=e629]: Sofascore tracks live football scores and UEFA Champions League table, results, statistics and top scorers.
                    - heading "Competition format of UEFA Champions League" [level=2] [ref=e630]
                    - paragraph [ref=e631]: The competition features a 36-team league table where each team plays 8 matches against different opponents, with 4 games at home and 4 away. The top 8 teams in the league advance directly to the Round of 16 in the knockout stage.
                    - paragraph [ref=e632]: Teams ranked 9th to 24th enter a play-off round, where the highest-ranked team faces the lowest-ranked in a two-legged tie, while teams finishing 25th to 36th are eliminated from the competition.
                    - paragraph [ref=e633]: After the league and play-off stages, the tournament moves to the knockout phase, featuring two-legged ties, except for the final, which is a single match.
                    - heading "UEFA Champions League top scorers" [level=2] [ref=e634]
                    - paragraph [ref=e635]: The top scorers in the last season of UEFA Champions League UEFA Champions League 25/26 season were Kylian Mbappé.Last season top scorer is Kylian Mbappé with 15 goals.
                    - heading "Team stadiums and attendance" [level=2] [ref=e636]
                    - paragraph [ref=e637]: The team with the largest stadium is Barcelona with the capacity of 99354.
                    - heading "TV partners" [level=2] [ref=e638]
