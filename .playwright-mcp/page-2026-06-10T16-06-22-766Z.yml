                    - paragraph [ref=e640]: The team with the most titles in UEFA Champions League is Real Madrid.
                    - heading "Who won the first UEFA Champions League?" [level=3] [ref=e641]
                    - paragraph [ref=e642]: Real Madrid won the first UEFA Champions League.
                    - heading "Which team is the current titleholder in UEFA Champions League?" [level=3] [ref=e643]
